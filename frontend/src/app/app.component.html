<div class="app-layout">
  <app-sidebar
    *ngIf="sidebarVisible"
    [sessions]="sessions"
    [activeSessionId]="activeSessionId"
    (selectSession)="onSelectSession($event)"
    (newSession)="onNewSession()"
    (deleteSession)="onDeleteRequest($event)"
    (pinSession)="onPinSession($event)"
  ></app-sidebar>
  <app-chat
    [sessionId]="activeSessionId"
    (sessionCreated)="onSessionCreated($event)"
  ></app-chat>

  <div class="confirm-overlay" *ngIf="confirmingId" (click)="cancelDelete()">
    <div class="confirm-modal" (click)="$event.stopPropagation()">
      <p class="confirm-modal-text">Are you sure?</p>
      <div class="confirm-modal-actions">
        <button class="confirm-modal-no" (click)="cancelDelete()">No</button>
        <button class="confirm-modal-yes" (click)="confirmDelete()">Yes, delete</button>
      </div>
    </div>
  </div>
</div>
