<div class="sidebar">
  <div class="sidebar-header">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span>Conversations</span>
  </div>

  <div class="sidebar-list">
    <div
      class="sidebar-item"
      *ngFor="let s of sessions"
      [class.active]="s.id === activeSessionId"
      [class.pinned]="s.pinned"
      (click)="onSelect(s.id)"
    >
      <div class="sidebar-item-top">
        <span class="sidebar-item-title">{{ s.title || 'New conversation' }}</span>
        <div class="sidebar-actions">
          <button class="sidebar-pin" (click)="onPin($event, s.id)" title="Pin">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="17" x2="12" y2="22"/>
              <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
            </svg>
          </button>
          <button class="sidebar-delete" (click)="onDelete($event, s.id)" title="Delete">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </div>
      <span class="sidebar-item-date">{{ s.updated_at | date:'MMM d, HH:mm' }}</span>
    </div>

    <div class="sidebar-empty" *ngIf="sessions.length === 0">
      No conversations yet
    </div>
  </div>

  <button class="sidebar-new" (click)="onNew()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    New Chat
  </button>
</div>
