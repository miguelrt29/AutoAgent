services:
  - type: web
    name: autoagent-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ALLOWED_COMMANDS
        value: echo,pwd,ls
      - key: SENDGRID_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: autoagent-db
          property: connectionString

databases:
  - name: autoagent-db
    databaseName: autoagent
    plan: free
